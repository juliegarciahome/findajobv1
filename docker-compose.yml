services:
  postgres:
    image: postgres:16
    container_name: career_portal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_portal"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: career_portal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3005}
    container_name: career_portal_web
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/career_portal
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3005}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      NEXTAUTH_URL: https://findmejob.ai
      AUTH_TRUST_HOST: "true"
      # No separate BullMQ worker in this compose file — ingest runs inside the web process.
      USE_BULLMQ_INGEST: "false"
    volumes:
      - generated_pdfs:/app/public/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Restores https://findmejob.ai when the tunnel token is set in .env (see README).
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: career_portal_cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      # Prefer CLOUDFLARE_TUNNEL_TOKEN (README); fall back to TUNNEL_TOKEN (Cloudflare dashboard name)
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-${TUNNEL_TOKEN:-}}
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  generated_pdfs:
